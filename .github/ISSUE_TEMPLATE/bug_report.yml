name: Bug Report
description: Report a bug in Crosstalk
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!
        Do not include API keys or secrets in this report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: When I run crosstalk --resume <id>, it ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run crosstalk with ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `crosstalk --version` or the commit hash
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, and provider(s) in use
      placeholder: macOS 15, rustc 1.91, Anthropic + OpenAI
    validations:
      required: false
